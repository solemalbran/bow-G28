<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOW 2026-G28</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh}
.top-bar{background:#fff;border-bottom:1px solid #e8e4de;padding:0.9rem 1.5rem;position:sticky;top:0;z-index:50}
.top-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:28px;width:auto}
.logo-text p{font-size:12px;color:#888;margin-top:1px}
.top-right{display:flex;align-items:center;gap:10px}
.badge-count{font-size:12px;padding:4px 12px;border-radius:20px;background:#eeedf8;color:#2d2d5e;font-weight:500}
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-bar{width:100px;height:4px;background:#e8e4de;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.4s}
.progress-pct{font-size:12px;color:#888;min-width:32px}
.main{max-width:1100px;margin:0 auto;padding:1.5rem}
.search-wrap{margin-bottom:1.25rem;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid #e8e4de;border-radius:10px;font-size:14px;background:#fff;outline:none}
.search-wrap input:focus{border-color:#2d2d5e}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#aaa;font-size:15px}
.loading{text-align:center;padding:3rem;color:#aaa;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.card{background:#fff;border:1px solid #e8e4de;border-radius:14px;padding:1rem;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;gap:6px}
.card:hover{border-color:#2d2d5e;box-shadow:0 2px 12px rgba(45,45,94,0.08)}
.card.filled{border-color:#9FE1CB}
.card-top{display:flex;align-items:center;gap:10px}
.avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid #f0ede8}
.avatar-initial{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0;background:#eeedf8;color:#2d2d5e}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.3}
.card-rubro{font-size:11px;color:#888;margin-top:2px;line-height:1.3;}
.card-li{font-size:11px;color:#185FA5;display:flex;align-items:center;gap:3px;margin-top:4px;text-decoration:none}
.card-li:hover{text-decoration:underline}
.divider{border:none;border-top:1px solid #f0ede8}
.field{display:flex;gap:6px;font-size:11px;align-items:flex-start}
.field-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-purple{background:#534AB7}
.dot-teal{background:#1D9E75}
.field-body{color:#555;line-height:1.4}
.field-label{font-weight:600;color:#1a1a1a;display:block;margin-bottom:1px}
.pending-msg{font-size:11px;color:#bbb;font-style:italic;text-align:center;padding:4px 0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:#fff;border-radius:16px;padding:1.5rem;width:100%;max-width:440px;display:flex;flex-direction:column;gap:14px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;gap:12px}
.modal-title{font-size:16px;font-weight:600;color:#1a1a1a}
.modal-subtitle{font-size:13px;color:#888;margin-top:2px}
.modal-desc{font-size:13px;color:#666;background:#f8f7f4;border-radius:8px;padding:10px 12px}
.form-group label{font-size:12px;font-weight:600;color:#1a1a1a;display:block;margin-bottom:5px}
.form-group input,.form-group textarea{width:100%;padding:9px 12px;border:1px solid #e8e4de;border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.form-group input:focus,.form-group textarea:focus{border-color:#2d2d5e}
.form-group textarea{resize:vertical;min-height:56px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:8px 16px;font-size:13px;border:1px solid #e8e4de;border-radius:8px;background:#fff;cursor:pointer;color:#555}
.btn-save{padding:8px 18px;font-size:13px;border:none;border-radius:8px;background:#2d2d5e;color:#fff;cursor:pointer;font-weight:500}
.btn-save:hover{background:#3d3d7e}
.saving{opacity:0.6;pointer-events:none}
.empty-msg{text-align:center;padding:3rem;color:#aaa;font-size:14px}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
@media(max-width:600px){
  .grid{grid-template-columns:1fr!important}
  .card{padding:1.1rem}
  .avatar{width:60px!important;height:60px!important}
  .avatar-initial{width:60px!important;height:60px!important;font-size:18px!important}
  .card-name{font-size:15px!important}
  .card-rubro{font-size:13px!important}
  .card-li{font-size:13px!important}
  .field-body{font-size:13px!important}
  .pending-msg{font-size:13px!important}
  .badge-count{font-size:13px!important}
}
</style>
</head>

<div class="top-bar">
  <div class="top-inner">
    <div class="logo">
      <div style="background:#C0392B;color:#fff;font-weight:800;font-size:18px;padding:4px 10px;border-radius:6px;letter-spacing:1px">BOW</div>
      <div class="logo-text">
        <p>BOW 2026-G28 · Directorio privado</p>
      </div>
    </div>
    <div class="top-right">
      <div class="badge-count" id="badge">Cargando...</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
        <span class="progress-pct" id="pct">0%</span>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Buscar por nombre, rubro o interés..." oninput="render()">
  </div>
  <div class="loading" id="loading">Cargando directorio...</div>
  <div class="grid" id="grid" style="display:none"></div>
  <div class="empty-msg" id="empty" style="display:none">No se encontraron resultados.</div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <img id="m-photo" class="avatar" style="display:none;width:52px;height:52px">
      <div id="m-initial" class="avatar-initial" style="display:none;width:52px;height:52px"></div>
      <div>
        <div class="modal-title" id="m-name"></div>
        <div id="m-li-wrap"></div>
      </div>
    </div>
    <div class="modal-desc">Completa tu perfil para formar parte de nuestro directorio privado.</div>
    <div class="form-group">
      <label>Cargo y empresa</label>
      <input type="text" id="m-cargo" placeholder="Ej: Gerente Comercial en Empresa X">
    </div>
    <div class="form-group">
      <label>Rubro</label>
      <input type="text" id="m-rubro" placeholder="Ej: Salud, Tecnología, Educación...">
    </div>
    <div class="form-group">
      <label>¿Con qué rubros o perfiles te gustaría conectar?</label>
      <textarea id="m-busca" placeholder="Ej: Alguien del sector salud o educación..."></textarea>
    </div>
    <div class="form-group">
      <label>¿En qué sectores te mueves mejor para conectar a tus compañeras con las personas adecuadas?</label>
      <textarea id="m-ofrece" placeholder="Ej: Tengo contactos en retail y consumo masivo..."></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="saveModal()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let dbData = {};
let activeIdx = null;

function initials(name){const p=name.trim().split(" ");return(p[0][0]+(p[1]?p[1][0]:"")).toUpperCase();}

function photoEl(p,size){
  if(p.key&&PHOTOS[p.key]) return `<img src="${PHOTOS[p.key]}" class="avatar" style="width:${size}px;height:${size}px">`;
  return `<div class="avatar-initial" style="width:${size}px;height:${size}px">${initials(p.name)}</div>`;
}

async function loadData(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/bow_perfiles?select=*`,{
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    const rows = await res.json();
    dbData = {};
    rows.forEach(r=>dbData[r.id]=r);
  }catch(e){console.error(e);}
  document.getElementById("loading").style.display="none";
  document.getElementById("grid").style.display="grid";
  render();
  updateProgress();
}

function getData(name){return dbData[name]||{cargo:"",rubro:"",busca:"",ofrece:""};}

function updateProgress(){
  const filled=PEOPLE.filter(p=>{const d=getData(p.name);return d.cargo||d.rubro||d.busca||d.ofrece;}).length;
  const pct=Math.round(filled/PEOPLE.length*100);
  document.getElementById("prog").style.width=pct+"%";
  document.getElementById("badge").textContent=filled+" de "+PEOPLE.length+" completos";
  document.getElementById("pct").textContent=pct+"%";
}

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const filtered=PEOPLE.filter(p=>{
    if(!q)return true;
    const d=getData(p.name);
    return[p.name,d.cargo,d.rubro,d.busca,d.ofrece].some(s=>(s||"").toLowerCase().includes(q));
  });
  const grid=document.getElementById("grid");
  const empty=document.getElementById("empty");
  if(!filtered.length){grid.innerHTML="";empty.style.display="block";return;}
  empty.style.display="none";
  grid.innerHTML=filtered.map(p=>{
    const idx=PEOPLE.indexOf(p);
    const d=getData(p.name);
    const hasFill=d.cargo||d.rubro||d.busca||d.ofrece;
    return `<div class="card${hasFill?' filled':''}" onclick="openModal(${idx})">
      <div class="card-top">
        ${photoEl(p,48)}
        <div class="card-info">
          <div class="card-name">${p.name}</div>
          ${d.rubro?`<div class="card-rubro">${d.rubro}</div>`:(d.cargo?`<div class="card-rubro">${d.cargo}</div>`:'')}<a class="card-li" href="${p.url}" target="_blank" onclick="event.stopPropagation()">🔗 LinkedIn</a>
        </div>
      </div>
      ${hasFill?`<hr class="divider">
        ${d.busca?`<div class="field"><span class="field-dot dot-purple"></span><div class="field-body"><span class="field-label">Me interesaría conectar con</span>${d.busca}</div></div>`:''}
        ${d.ofrece?`<div class="field"><span class="field-dot dot-teal"></span><div class="field-body"><span class="field-label">Yo puedo conectarte con</span>${d.ofrece}</div></div>`:''}
      `:`<hr class="divider"><div class="pending-msg">Perfil pendiente · click para completar</div>`}
    </div>`;
  }).join("");
}

function openModal(idx){
  activeIdx=idx;
  const p=PEOPLE[idx];
  const d=getData(p.name);
  const mPhoto=document.getElementById("m-photo");
  const mInit=document.getElementById("m-initial");
  if(p.key&&PHOTOS[p.key]){mPhoto.src=PHOTOS[p.key];mPhoto.style.display="block";mInit.style.display="none";}
  else{mInit.textContent=initials(p.name);mInit.style.display="flex";mPhoto.style.display="none";}
  document.getElementById("m-name").textContent=p.name;
  document.getElementById("m-li-wrap").innerHTML=`<a href="${p.url}" target="_blank" style="color:#185FA5;font-size:12px">Ver LinkedIn →</a>`;
  document.getElementById("m-cargo").value=d.cargo||"";
  document.getElementById("m-rubro").value=d.rubro||"";
  document.getElementById("m-busca").value=d.busca||"";
  document.getElementById("m-ofrece").value=d.ofrece||"";
  document.getElementById("overlay").style.display="flex";
}

function closeModal(){document.getElementById("overlay").style.display="none";activeIdx=null;}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

async function saveModal(){
  if(activeIdx===null)return;
  const p=PEOPLE[activeIdx];
  const btn=document.getElementById("btn-save");
  btn.classList.add("saving");btn.textContent="Guardando...";
  const payload={
    id:p.name,
    cargo:document.getElementById("m-cargo").value.trim(),
    rubro:document.getElementById("m-rubro").value.trim(),
    busca:document.getElementById("m-busca").value.trim(),
    ofrece:document.getElementById("m-ofrece").value.trim(),
    updated_at:new Date().toISOString()
  };
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/bow_perfiles`,{
      method:"POST",
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify(payload)
    });
    if(res.ok||res.status===201||res.status===200){
      dbData[p.name]=payload;
      showToast("✓ Guardado correctamente");
      closeModal();render();updateProgress();
    }else{
      const err=await res.text();
      showToast("Error al guardar. Intenta de nuevo.");
      console.error(err);
    }
  }catch(e){showToast("Error de conexión.");console.error(e);}
  btn.classList.remove("saving");btn.textContent="Guardar";
}

loadData();
setInterval(()=>{loadData();}, 30000);
</script>
